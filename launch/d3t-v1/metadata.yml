tagline: Three-layer Tic-Tac-Toe with forced replies
short_description: Play D3T, a tense three-layer Grandfather Tic-Tac-Toe strategy game.
long_description: D3T turns Tic-Tac-Toe into a three-layer strategy duel. Every move sends the next player into a forced board, creating traps, tempo swings, and sudden reversals across 729 tiny cells. The public web app supports account-based friend challenges, while portal builds launch instantly into guest pass-and-play.
controls: Click or tap any highlighted legal cell. After each move, the next player must play in the board routed by the previous move.
